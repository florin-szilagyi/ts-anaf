name: Publish SDK (anaf-ts-sdk)

on:
  push:
    tags:
      - 'sdk-v*.*.*'
      - 'sdk-v*.*.*-*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Version bump (patch / minor / major)'
        required: false
        default: 'patch'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org/'

      - name: Install packages
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @florinszilagyi/anaf-ts-sdk run build

      - name: Test SDK
        run: pnpm --filter @florinszilagyi/anaf-ts-sdk run validate

      - name: Publish SDK
        run: pnpm --filter @florinszilagyi/anaf-ts-sdk publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
